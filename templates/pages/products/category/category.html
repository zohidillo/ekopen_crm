{% extends "home.html" %}
{% load static %}

{% block main %}
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Maxsulot</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <div class="btn-group me-2">
                    <button type="button" class="btn btn-sm btn-outline-success">Export</button>
                    <a href="/product/category/create" type="button" class="btn btn-sm btn-outline-primary">Yangi
                        qoshish <i
                                class="bi bi-plus-circle-dotted"></i></a>
                </div>
            </div>
        </div>

        <h2>Kategorialar</h2>
        <div class="table-responsive small">
            <table class="table table-striped table-sm">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Nomi</th>
                    <th scope="col"></th>
                </tr>
                </thead>
                <tbody>
                {% for object in object_list %}
                    <tr>
                        <td>{{ object.id }}</td>
                        <td>{{ object.name }}</td>
                        <td>
                            <a href="/product/category/update/{{ object.id }}"><i class="bi bi-pencil-square"></i></a>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
        {% include "widgets/pagination.html" %}
    </main>
{% endblock %}
